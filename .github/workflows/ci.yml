name: CI - Serviço de Pagamento

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Toda segunda-feira às 08:00 UTC (05:00 no horário de Brasília).
    - cron: '0 8 * * 1'

jobs:
  testes:
    name: Testes automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar as dependências
        run: npm ci

      - name: Executar os testes e gerar o relatório
        run: npm run test:report

      - name: Armazenar o relatório da execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-${{ github.run_number }}
          path: mochawesome-report/
          if-no-files-found: warn
          retention-days: 7
